<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enter Our Love Story</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Lora:wght@400;500&family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Lora', serif;
      overflow-x: hidden;
    }

    .background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('/images/your-photo.jpg') center/cover no-repeat;
      filter: blur(4px);
      transform: scale(1.1);
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(255, 182, 193, 0.7), rgba(255, 228, 225, 0.6));
      z-index: -1;
    }

    .hearts-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .heart {
      position: absolute;
      animation: floatHeart 8s ease-in infinite;
      font-size: 2rem;
      opacity: 0.7;
    }

    @keyframes floatHeart {
      0% {
        transform: translateY(0) translateX(0);
        opacity: 0;
      }
      10% {
        opacity: 0.7;
      }
      90% {
        opacity: 0.7;
      }
      100% {
        transform: translateY(-100vh) translateX(100px);
        opacity: 0;
      }
    }

    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      z-index: 10;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 50px 40px;
      box-shadow: 0 10px 40px rgba(212, 118, 140, 0.2);
      max-width: 400px;
      width: 100%;
      animation: fadeInUp 1s ease-out;
    }

    .login-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      color: #c45b73;
      text-align: center;
      margin-bottom: 15px;
    }

    .login-subtitle {
      font-family: 'Dancing Script', cursive;
      font-size: 1.2rem;
      color: #d4768c;
      text-align: center;
      margin-bottom: 35px;
    }

    .form-group {
      margin-bottom: 25px;
    }

    .form-label {
      display: block;
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .form-input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #f0e0e0;
      border-radius: 10px;
      font-family: 'Lora', serif;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: #ffb6c1;
      box-shadow: 0 0 10px rgba(255, 182, 193, 0.3);
      background: #fffbfc;
    }

    .submit-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #ffb6c1, #ff69b4);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'Lora', serif;
      font-size: 1.1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3);
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 105, 180, 0.4);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .error-message {
      display: none;
      color: #e74c3c;
      text-align: center;
      margin-top: 15px;
      font-size: 0.9rem;
      animation: shake 0.5s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="background"></div>
  <div class="overlay"></div>
  <div id="hearts" class="hearts-container"></div>

  <div class="container">
    <div class="login-card">
      <h1 class="login-title">Welcome</h1>
      <p class="login-subtitle">Our Love Story</p>

      <form onsubmit="checkPassword(event)">
        <div class="form-group">
          <label class="form-label" for="password">Enter Password:</label>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            placeholder="Enter the password"
            required
          >
        </div>

        <button type="submit" class="submit-btn">Enter</button>
        <div class="error-message" id="errorMessage">❌ Wrong password. Try again.</div>
      </form>
    </div>
  </div>

  <script>
    // Floating hearts animation
    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      
      const size = Math.random() * 20 + 10;
      const left = Math.random() * 100;
      const duration = Math.random() * 5 + 8;
      const delay = Math.random() * 5;
      
      heart.style.left = left + '%';
      heart.style.fontSize = size + 'px';
      heart.style.color = `rgba(255, ${Math.floor(Math.random() * 100 + 150)}, ${Math.floor(Math.random() * 100 + 180)}, 0.7)`;
      heart.style.animationDuration = duration + 's';
      heart.style.animationDelay = delay + 's';
      
      document.getElementById('hearts').appendChild(heart);
      
      setTimeout(() => {
        heart.remove();
      }, (duration + delay) * 1000);
    }

    // Initial hearts
    for (let i = 0; i < 15; i++) {
      setTimeout(createHeart, i * 300);
    }

    // Continuous hearts
    setInterval(createHeart, 800);

    // Password check
    function checkPassword(event) {
      event.preventDefault();
      
      const password = document.getElementById('password').value;
      const correctPassword = 'yazaka2501'; // Change this to your desired password
      
      if (password === correctPassword) {
        // Store that user is authenticated
        localStorage.setItem('authenticated', 'true');
        // Redirect to home page
        window.location.href = 'home.html';
      } else {
        // Show error message
        const errorMsg = document.getElementById('errorMessage');
        errorMsg.style.display = 'block';
        document.getElementById('password').value = '';
        
        // Hide error after 3 seconds
        setTimeout(() => {
          errorMsg.style.display = 'none';
        }, 3000);
      }
    }
  </script>
</body>
</html>
